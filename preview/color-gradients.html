<!doctype html>
<html><head><meta charset="utf-8"><title>Gradients</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow">Gradients — The Only Allowed Recipes</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div>
      <div style="height:110px;border-radius:0;background:radial-gradient(ellipse at 30% 40%, #93C5FD 0%, #2563EB 20%, #020617 70%);"></div>
      <div style="font:500 12px 'TWK Everett Mono','JetBrains Mono',monospace;margin-top:8px;">Spotlight (hero)</div>
      <div style="font:400 10px 'JetBrains Mono',monospace;color:#94A3B8;">radial · 30% 40%</div>
    </div>
    <div>
      <div style="height:110px;border-radius:0;background:linear-gradient(135deg, #020617, #020617 30%, #020617 70%, #020617), linear-gradient(135deg, transparent 0%, rgba(147,197,253,0.4) 50%, transparent 100%);background-blend-mode:normal;"></div>
      <div style="font:500 12px 'TWK Everett Mono','JetBrains Mono',monospace;margin-top:8px;">Beam (diagonal)</div>
      <div style="font:400 10px 'JetBrains Mono',monospace;color:#94A3B8;">linear · 135deg</div>
    </div>
    <div>
      <div style="height:110px;border-radius:0;background:linear-gradient(135deg, #000000 0%, #020617 50%, #172554 100%);"></div>
      <div style="font:500 12px 'TWK Everett Mono','JetBrains Mono',monospace;margin-top:8px;">Surface (dark)</div>
      <div style="font:400 10px 'JetBrains Mono',monospace;color:#94A3B8;">#000 → #020617 → #172554</div>
    </div>
    <div>
      <div style="height:110px;border-radius:0;background:linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);border:1px solid #E2E8F0;"></div>
      <div style="font:500 12px 'TWK Everett Mono','JetBrains Mono',monospace;margin-top:8px;">Panel (light)</div>
      <div style="font:400 10px 'JetBrains Mono',monospace;color:#94A3B8;">#FFF → #F8FAFC</div>
    </div>
  </div>
</div>
</body></html>
