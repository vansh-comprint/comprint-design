<!doctype html>
<html><head><meta charset="utf-8"><title>Palette Hierarchy</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-frame" style="background:#F6F6F8;">
  <div class="eyebrow">Palette Hierarchy</div>
  <div style="display:flex;gap:10px;margin-top:10px;align-items:stretch;height:120px;">
    <div style="flex:5;background:#F6F6F8;border:1px solid #E2E8F0;border-radius:0;display:flex;flex-direction:column;justify-content:space-between;padding:14px;">
      <div style="font:500 10px/1 'TWK Everett Mono','JetBrains Mono',monospace;letter-spacing:.3em;text-transform:uppercase;color:#94A3B8;">PRIMARY</div>
      <div>
        <div style="font:600 16px/1.2 'TWK Everett Mono','JetBrains Mono',monospace;color:#131313;">White</div>
        <div style="font:400 11px/1.2 'TWK Everett Mono','JetBrains Mono',monospace;color:#475569;margin-top:2px;">#F6F6F8</div>
      </div>
    </div>
    <div style="flex:5;background:#131313;border-radius:0;display:flex;flex-direction:column;justify-content:space-between;padding:14px;">
      <div style="font:500 10px/1 'TWK Everett Mono','JetBrains Mono',monospace;letter-spacing:.3em;text-transform:uppercase;color:#94A3B8;">PRIMARY</div>
      <div>
        <div style="font:600 16px/1.2 'TWK Everett Mono','JetBrains Mono',monospace;color:#F6F6F8;">Black</div>
        <div style="font:400 11px/1.2 'TWK Everett Mono','JetBrains Mono',monospace;color:#94A3B8;margin-top:2px;">#131313</div>
      </div>
    </div>
    <div style="flex:2;background:#1D4ED8;border-radius:0;display:flex;flex-direction:column;justify-content:space-between;padding:14px;">
      <div style="font:500 10px/1 'TWK Everett Mono','JetBrains Mono',monospace;letter-spacing:.3em;text-transform:uppercase;color:rgba(246,246,248,.7);">ACCENT</div>
      <div>
        <div style="font:600 14px/1.2 'TWK Everett Mono','JetBrains Mono',monospace;color:#F6F6F8;">Blue</div>
        <div style="font:400 10px/1.2 'TWK Everett Mono','JetBrains Mono',monospace;color:rgba(246,246,248,.7);margin-top:2px;">#1D4ED8</div>
      </div>
    </div>
    <div style="flex:.6;background:#E2E8F0;border-radius:0;"></div>
  </div>
  <div style="font:400 12px/1.5 Inter;color:#475569;margin-top:12px;max-width:62ch;">
    <strong style="color:#131313;font-weight:600;">Black and white first.</strong> Blue, sparingly, for emphasis. Grey only for hairline borders and metadata — never as a surface color.
  </div>
</div>
</body></html>
