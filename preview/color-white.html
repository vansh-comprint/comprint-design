<!doctype html>
<html><head><meta charset="utf-8"><title>White</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-frame dark">
  <div class="eyebrow">White — Light Surfaces &amp; Text</div>
  <div class="row gap-3">
    <div class="col gap-2" style="flex:1">
      <div style="height:120px;background:#F6F6F8;border-radius:12px;"></div>
      <div style="font:500 13px/1.2 Inter;">White</div>
      <div style="font:400 12px/1.2 'JetBrains Mono',monospace;color:#94A3B8;">#F6F6F8</div>
      <div style="font:400 11px/1.3 Inter;color:#94A3B8;">Primary on dark</div>
    </div>
    <div class="col gap-2" style="flex:1">
      <div style="height:120px;background:rgba(255,255,255,0.72);border-radius:12px;"></div>
      <div style="font:500 13px/1.2 Inter;color:#fff;">White Dim</div>
      <div style="font:400 12px/1.2 'JetBrains Mono',monospace;color:#94A3B8;">rgba(255,255,255,.72)</div>
      <div style="font:400 11px/1.3 Inter;color:#94A3B8;">Secondary text on dark</div>
    </div>
    <div class="col gap-2" style="flex:1">
      <div style="height:120px;background:rgba(255,255,255,0.08);border-radius:12px;border:1px solid rgba(255,255,255,0.12);"></div>
      <div style="font:500 13px/1.2 Inter;color:#fff;">White Faint</div>
      <div style="font:400 12px/1.2 'JetBrains Mono',monospace;color:#94A3B8;">rgba(255,255,255,.08)</div>
      <div style="font:400 11px/1.3 Inter;color:#94A3B8;">Grid lines, borders</div>
    </div>
  </div>
</div>
</body></html>
