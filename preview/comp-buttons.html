<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow">Buttons — Sharp + Cut Edges</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px;">
    <!-- Primary: chamfered corners (cut edges) via clip-path -->
    <button style="font:500 14px 'TWK Everett Mono',monospace;padding:14px 26px;border:none;background:#1D4ED8;color:#F6F6F8;cursor:pointer;display:inline-flex;align-items:center;gap:8px;letter-spacing:.02em;clip-path:polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);">+ CREATE <span style="color:rgba(246,246,248,.45);font-weight:300;">|</span> <span style="font-weight:400;">BRAND INTELLIGENCE</span></button>
    <!-- Secondary: sharp square -->
    <button style="font:500 14px 'TWK Everett Mono',monospace;padding:14px 24px;border:1px solid #131313;background:transparent;color:#131313;cursor:pointer;letter-spacing:.02em;">SECONDARY</button>
    <!-- Subtle radius (2px) -->
    <button style="font:500 14px 'TWK Everett Mono','JetBrains Mono',monospace;padding:14px 24px;border-radius:0;border:none;background:#F6F6F8;color:#475569;cursor:pointer;border:1px solid #E2E8F0;">Ghost · 2px</button>
  </div>

  <div style="background:#131313;padding:16px 14px;margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;clip-path:polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);">
    <button style="font:500 14px 'TWK Everett Mono',monospace;padding:14px 26px;border:none;background:#1D4ED8;color:#F6F6F8;cursor:pointer;letter-spacing:.02em;clip-path:polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);box-shadow:0 0 12px rgba(29,78,216,.5);">PRIMARY · DARK</button>
    <button style="font:500 14px 'TWK Everett Mono',monospace;padding:14px 24px;border:1px solid rgba(246,246,248,.3);background:transparent;color:#F6F6F8;cursor:pointer;letter-spacing:.02em;">GHOST · DARK</button>
    <div style="font:400 11px 'TWK Everett Mono',monospace;color:#94A3B8;margin-left:auto;">chamfer · 10px cut</div>
  </div>

  <div style="font:400 11px/1.4 Inter;color:#94A3B8;margin-top:12px;">Primary buttons use a 10px diagonal cut on the top-left + bottom-right corners — a quiet nod to the chamfered forms in the wordmark. Secondary stays crisp square. Use sparingly; not every button needs the cut.</div>
</div>
</body></html>
