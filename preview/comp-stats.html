<!doctype html>
<html><head><meta charset="utf-8"><title>Stat Tiles</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-frame" style="background:#131313;color:#F6F6F8;padding:24px 24px 22px;">
  <div class="eyebrow" style="color:#94A3B8;">Stat Tiles — Short Separators · Beveled</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;margin-top:18px;position:relative;align-items:center;">
    <div style="padding:0 44px;position:relative;text-align:center;">
      <div style="font:900 48px/1 'Chakra Petch',sans-serif;letter-spacing:-0.03em;color:#F6F6F8;text-shadow:0 1px 0 rgba(255,255,255,.08), 0 3px 0 rgba(0,0,0,.85), 0 4px 8px rgba(0,0,0,.5);">99.2%</div>
      <div style="font:500 11px/1 'TWK Everett Mono','JetBrains Mono',monospace;letter-spacing:.3em;text-transform:uppercase;color:#94A3B8;margin-top:10px;">ACCURACY</div>
      <!-- short beveled separator, vertically centered on the number -->
      <div style="position:absolute;right:-1px;top:50%;transform:translateY(-50%) translateY(-10px);width:3px;height:44px;background:linear-gradient(90deg,rgba(0,0,0,.9) 0%,#F6F6F8 33%,#F6F6F8 66%,rgba(0,0,0,.5) 100%);box-shadow:0 1px 0 rgba(255,255,255,.12), 0 -1px 0 rgba(0,0,0,.6);"></div>
    </div>
    <div style="padding:0 44px;position:relative;text-align:center;">
      <div style="font:900 48px/1 'Chakra Petch',sans-serif;letter-spacing:-0.03em;color:#1D4ED8;text-shadow:0 0 22px rgba(29,78,216,.5), 0 3px 0 rgba(0,0,0,.85);">40+</div>
      <div style="font:500 11px/1 'TWK Everett Mono','JetBrains Mono',monospace;letter-spacing:.3em;text-transform:uppercase;color:#94A3B8;margin-top:10px;">FEATURES</div>
      <div style="position:absolute;right:-1px;top:50%;transform:translateY(-50%) translateY(-10px);width:3px;height:44px;background:linear-gradient(90deg,rgba(0,0,0,.9) 0%,#F6F6F8 33%,#F6F6F8 66%,rgba(0,0,0,.5) 100%);box-shadow:0 1px 0 rgba(255,255,255,.12), 0 -1px 0 rgba(0,0,0,.6);"></div>
    </div>
    <div style="padding:0 44px;text-align:center;">
      <div style="font:900 48px/1 'Chakra Petch',sans-serif;letter-spacing:-0.03em;color:#F6F6F8;text-shadow:0 1px 0 rgba(255,255,255,.08), 0 3px 0 rgba(0,0,0,.85), 0 4px 8px rgba(0,0,0,.5);">300<span style="color:#1D4ED8;">+</span></div>
      <div style="font:500 11px/1 'TWK Everett Mono','JetBrains Mono',monospace;letter-spacing:.3em;text-transform:uppercase;color:#94A3B8;margin-top:10px;">INTEGRATIONS</div>
    </div>
  </div>
  <div style="font:400 11px/1.4 Inter;color:#94A3B8;margin-top:18px;">Separators are 44px tall — just taller than the caption, shorter than the number. Bevel runs horizontally: dark edge → light core → darker fall-off, with a 1px highlight/shadow on top and bottom.</div>
</div>
</body></html>
