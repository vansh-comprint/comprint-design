<!doctype html>
<html><head><meta charset="utf-8"><title>Elevation</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-frame" style="background:#F5F5F7;padding:32px 28px 36px;">
  <div class="eyebrow" style="color:#6E6E73;">Elevation — Soft · Layered · Precise</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:22px;margin-top:22px;padding:14px 6px 40px;">

    <!-- sm: whisper -->
    <div style="background:#FFFFFF;height:104px;padding:14px;font:500 10px/1 Inter;letter-spacing:.3em;text-transform:uppercase;color:#86868B;display:flex;align-items:flex-end;box-shadow:0 0 0 .5px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.03), 0 2px 6px rgba(0,0,0,.04);">sm</div>

    <!-- md: resting -->
    <div style="background:#FFFFFF;height:104px;padding:14px;font:500 10px/1 Inter;letter-spacing:.3em;text-transform:uppercase;color:#86868B;display:flex;align-items:flex-end;box-shadow:0 0 0 .5px rgba(0,0,0,.04), 0 2px 4px rgba(0,0,0,.04), 0 8px 20px rgba(0,0,0,.06);">md</div>

    <!-- lg: lifted -->
    <div style="background:#FFFFFF;height:104px;padding:14px;font:500 10px/1 Inter;letter-spacing:.3em;text-transform:uppercase;color:#86868B;display:flex;align-items:flex-end;box-shadow:0 0 0 .5px rgba(0,0,0,.05), 0 4px 8px rgba(0,0,0,.04), 0 18px 40px rgba(0,0,0,.09), 0 32px 64px rgba(0,0,0,.06);">lg</div>

    <!-- blue plate: deep surface with ambient tint -->
    <div style="background:#0B1020;height:104px;padding:14px;font:500 10px/1 Inter;letter-spacing:.3em;text-transform:uppercase;color:#BFDBFE;display:flex;align-items:flex-end;box-shadow:0 0 0 .5px rgba(29,78,216,.35), 0 4px 10px rgba(29,78,216,.12), 0 20px 48px rgba(29,78,216,.22);">blue tint</div>

  </div>
  <div style="font:400 11px/1.55 Inter;color:#86868B;margin-top:-4px;max-width:560px;">Three-layer shadow recipe: <span style="color:#1D1D1F;">½px hairline ring</span> + <span style="color:#1D1D1F;">tight contact shadow</span> + <span style="color:#1D1D1F;">wide ambient shadow</span>. No gradients on the surface — just diffused light. Opacities stay between 3–9%.</div>
</div>
</body></html>
