<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow">Spacing — 4px Base Scale</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
    <!-- rows: label, bar, size -->
    <div style="display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:12px;">
      <div style="font:500 11px 'JetBrains Mono',monospace;color:#475569;">space-1</div><div style="height:14px;background:#2563EB;width:4px;border-radius:2px;"></div><div style="font:400 11px 'JetBrains Mono',monospace;color:#94A3B8;">4 px</div>
    </div>
    <div style="display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:12px;">
      <div style="font:500 11px 'JetBrains Mono',monospace;color:#475569;">space-2</div><div style="height:14px;background:#2563EB;width:8px;border-radius:2px;"></div><div style="font:400 11px 'JetBrains Mono',monospace;color:#94A3B8;">8 px</div>
    </div>
    <div style="display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:12px;">
      <div style="font:500 11px 'JetBrains Mono',monospace;color:#475569;">space-4</div><div style="height:14px;background:#2563EB;width:16px;border-radius:2px;"></div><div style="font:400 11px 'JetBrains Mono',monospace;color:#94A3B8;">16 px</div>
    </div>
    <div style="display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:12px;">
      <div style="font:500 11px 'JetBrains Mono',monospace;color:#475569;">space-6</div><div style="height:14px;background:#2563EB;width:32px;border-radius:2px;"></div><div style="font:400 11px 'JetBrains Mono',monospace;color:#94A3B8;">32 px</div>
    </div>
    <div style="display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:12px;">
      <div style="font:500 11px 'JetBrains Mono',monospace;color:#475569;">space-8</div><div style="height:14px;background:#2563EB;width:64px;border-radius:2px;"></div><div style="font:400 11px 'JetBrains Mono',monospace;color:#94A3B8;">64 px · slide edge</div>
    </div>
    <div style="display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:12px;">
      <div style="font:500 11px 'JetBrains Mono',monospace;color:#475569;">space-10</div><div style="height:14px;background:#2563EB;width:128px;border-radius:2px;"></div><div style="font:400 11px 'JetBrains Mono',monospace;color:#94A3B8;">128 px</div>
    </div>
  </div>
</div>
</body></html>
